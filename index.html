<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chuyển đổi tiền tệ</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <div class="container">
        <div>
            <div class="card-header">
                <h1>Chuyển đổi tiền tệ</h1>
                <p class="subtitle">USD &bull; EUR &bull; AUD &bull; VND</p>
            </div>

            <div>
                <label for="amount">Số tiền</label>
                <input type="number" id="amount" placeholder="Nhập số tiền..." value="1" min="0" step="any">
                <span class="error-message" id="errorMsg"></span>
            </div>

            <div>
                <div>
                    <label for="fromCurrency">Từ</label>
                    <select id="fromCurrency">
                        <option value="USD">USD — Đô La Mỹ</option>
                        <option value="EUR">EUR — Euro</option>
                        <option value="AUD">AUD — Đô La Úc</option>
                        <option value="VND">VND — Đồng Việt Nam</option>
                    </select>
                </div>

                <button id="swapBtn" class="swap-btn" title="Hoán đổi">⇄</button>

                <div>
                    <label for="toCurrency">Sang</label>
                    <select id="toCurrency">
                        <option value="EUR">EUR — Euro</option>
                        <option value="USD">USD — Đô La Mỹ</option>
                        <option value="AUD">AUD — Đô La Úc</option>
                        <option value="VND">VND — Đồng Việt Nam</option>
                    </select>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
